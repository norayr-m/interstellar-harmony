function createReverb() {
  const len = ctx.sampleRate * 6;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      const t = i / len;
      let env;
      if (t < 0.015) env = 0.8;
      else if (t < 0.04) env = 1.8;
      else if (t < 0.08) env = 2.2;
      else if (t < 0.2)  env = 1.4 * Math.pow(1 - (t-0.08)/0.12, 0.4);
      else                env = 0.9 * Math.pow(1 - t, 2.8);
      d[i] = (Math.random() * 2 - 1) * env * (ch === 0 ? 1 : 0.95);
    }
  }
  const conv = ctx.createConvolver();
  conv.buffer = buf;
  return conv;
}

function warmChain(output) {
  const lo = ctx.createBiquadFilter();
  lo.type = 'lowshelf'; lo.frequency.value = 300; lo.gain.value = 7;
  const mid = ctx.createBiquadFilter();
  mid.type = 'peaking'; mid.frequency.value = 700; mid.Q.value = 0.7; mid.gain.value = 4;
  const hi = ctx.createBiquadFilter();
  hi.type = 'highshelf'; hi.frequency.value = 2500; hi.gain.value = -5;
  lo.connect(mid); mid.connect(hi); hi.connect(output);
  return lo;
}

function organ(freq, gain, output, t0, dur) {
  const warm = warmChain(output);
  const vg = ctx.createGain();

  vg.gain.setValueAtTime(0, t0);
  vg.gain.linearRampToValueAtTime(gain * 0.1, t0 + 1.5);
  vg.gain.linearRampToValueAtTime(gain * 0.6, t0 + 3.0);
  vg.gain.linearRampToValueAtTime(gain, t0 + dur * 0.5);
  vg.gain.setValueAtTime(gain, t0 + dur - 3);
  vg.gain.linearRampToValueAtTime(gain * 0.3, t0 + dur - 1);
  vg.gain.linearRampToValueAtTime(0, t0 + dur + 1);
  vg.connect(warm);

  const ranks = [
    { r:1,   a:1.0,  w:'triangle' },
    { r:2,   a:0.55, w:'sine' },
    { r:3,   a:0.3,  w:'triangle' },
    { r:4,   a:0.18, w:'sine' },
    { r:5,   a:0.08, w:'sine' },
    { r:6,   a:0.05, w:'sine' },
    { r:8,   a:0.03, w:'sine' },
  ];

  ranks.forEach(rk => {
    for (let c = 0; c < 3; c++) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = rk.w;
      o.frequency.value = freq * rk.r;
      o.detune.value = (c - 1) * 4 + (Math.random() - 0.5) * 3;
      g.gain.value = rk.a * (c === 1 ? 1 : 0.35);
      o.connect(g); g.connect(vg);
      o.start(t0); o.stop(t0 + dur + 2);
    }
  });

  const ch = ctx.createOscillator();
  const chg = ctx.createGain();
  ch.type = 'triangle'; ch.frequency.value = freq * 2.01;
  chg.gain.setValueAtTime(gain * 0.06, t0);
  chg.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.4);
  ch.connect(chg); chg.connect(vg);
  ch.start(t0); ch.stop(t0 + 0.6);
}

function stringPad(freq, gain, output, t0, dur) {
  const warm = warmChain(output);
  const vg = ctx.createGain();

  vg.gain.setValueAtTime(0, t0);
  vg.gain.linearRampToValueAtTime(gain * 0.3, t0 + 3);
  vg.gain.linearRampToValueAtTime(gain, t0 + dur * 0.6);
  vg.gain.setValueAtTime(gain, t0 + dur - 4);
  vg.gain.linearRampToValueAtTime(0, t0 + dur + 1.5);
  vg.connect(warm);

  for (let v = 0; v < 4; v++) {
    const o = ctx.createOscillator();
    const f = ctx.createBiquadFilter();
    const g = ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.value = freq;
    o.detune.value = (v - 1.5) * 8 + (Math.random() - 0.5) * 5;

    f.type = 'lowpass';
    f.frequency.value = 500 + Math.random() * 200;
    f.Q.value = 0.5;

    g.gain.value = 0.25;
    o.connect(f); f.connect(g); g.connect(vg);
    o.start(t0); o.stop(t0 + dur + 3);
  }
}

function bassDrone(freq, gain, t0, dur) {
  [0.5, 0.25].forEach((mult, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = i === 0 ? 'triangle' : 'sine';
    o.frequency.value = freq * mult;
    const vol = gain * (i === 0 ? 0.7 : 0.4);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 3);
    g.gain.setValueAtTime(vol, t0 + dur - 3.5);
    g.gain.linearRampToValueAtTime(0, t0 + dur + 1);
    o.connect(g);
    g.connect(i === 0 ? reverb : master);
    o.start(t0); o.stop(t0 + dur + 2);
  });
}

function startTick() {
  tickInterval = setInterval(() => {
    if (!ctx || !playing) return;
    const now = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    const f = ctx.createBiquadFilter();
    o.type = 'square';
    o.frequency.value = 1200;
    f.type = 'bandpass'; f.frequency.value = 1000; f.Q.value = 5;
    g.gain.setValueAtTime(0.015 * GMF, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
    o.connect(f); f.connect(g); g.connect(master);
    o.start(now); o.stop(now + 0.08);

    const el = document.getElementById('tick');
    el.textContent = '·';
    el.style.opacity = '0.3';
    setTimeout(() => { el.style.opacity = '0.1'; }, 100);
  }, 1200);
}

function dissonant(freq, gain, output, t0, dur) {
  const vg = ctx.createGain();
  vg.gain.setValueAtTime(0, t0);
  vg.gain.linearRampToValueAtTime(gain, t0 + 1.5);
  vg.gain.setValueAtTime(gain, t0 + dur - 2);
  vg.gain.linearRampToValueAtTime(0, t0 + dur);
  vg.connect(output);

  [1, Math.sqrt(2), 16/15, 7/5].forEach((r, i) => {
    const o = ctx.createOscillator();
    o.type = i < 2 ? 'sawtooth' : 'square';
    o.frequency.value = freq * r;
    const f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 500; f.Q.value = 3;
    o.connect(f); f.connect(vg);
    o.start(t0); o.stop(t0 + dur + 1);
  });
}

function warnTone(freq, gain, output, t0, dur) {
  organ(freq + 2.5, gain * 0.5, output, t0, dur);
  organ(freq - 1.8, gain * 0.4, output, t0, dur);
}

function scheduleMovement(idx, t0) {
  const mov = MOVEMENTS[idx % MOVEMENTS.length];
  const dur = mov.tempo;
  const dimBase = (idx * 5) % COMB.length;

  const bassFreq = ROOT * SCALE[mov.chord[0] % SCALE.length];
  bassDrone(bassFreq, 0.06 * GMF, t0, dur);

  mov.chord.forEach((deg, vi) => {
    const oct = vi === 0 ? 1 : vi === 1 ? 2 : 2;
    const freq = ROOT * SCALE[deg % SCALE.length] * oct;
    const gain = 0.03 * GMF * (vi === 0 ? 1.2 : 1.0);
    const dimIdx = (dimBase + vi) % COMB.length;
    const cell = COMB[dimIdx];

    if (cell.s === 'fail') dissonant(freq, gain * 2, reverb, t0, dur);
    else if (cell.s === 'warn') warnTone(freq, gain, reverb, t0, dur);
    else organ(freq, gain, reverb, t0, dur);
  });

  mov.pad.forEach((deg, pi) => {
    const freq = ROOT * SCALE[deg % SCALE.length];
    const dimIdx = (dimBase + 3 + pi) % COMB.length;
    const cell = COMB[dimIdx];
    const gain = 0.02 * GMF;

    if (cell.s === 'fail') dissonant(freq, gain * 1.5, reverb, t0, dur);
    else stringPad(freq, gain, reverb, t0, dur);
  });

  return dur;
}

function begin() {
  if (playing) return;
  playing = true;
  document.getElementById('btn-play').classList.add('on');

  ctx = new AC();
  analyser = ctx.createAnalyser();
  analyser.fftSize = 4096;
  analyser.smoothingTimeConstant = 0.9;

  compressor = ctx.createDynamicsCompressor();
  compressor.threshold.value = -15;
  compressor.ratio.value = 3;
  compressor.attack.value = 0.3;
  compressor.release.value = 1.0;

  reverb = createReverb();
  master = ctx.createGain();
  master.gain.value = 0.7;

  const mw = ctx.createBiquadFilter();
  mw.type = 'lowshelf'; mw.frequency.value = 250; mw.gain.value = 5;
  const mp = ctx.createBiquadFilter();
  mp.type = 'peaking'; mp.frequency.value = 500; mp.Q.value = 0.5; mp.gain.value = 4;
  const mh = ctx.createBiquadFilter();
  mh.type = 'highshelf'; mh.frequency.value = 2000; mh.gain.value = -3;

  reverb.connect(compressor);
  compressor.connect(mw); mw.connect(mp); mp.connect(mh);
  mh.connect(master);
  master.connect(analyser);
  analyser.connect(ctx.destination);

  step = 0;
  let t = ctx.currentTime + 0.5;

  startTick();

  function advance() {
    if (!playing) return;
    const movIdx = step % 7;
    const dimBase = (step * 5) % COMB.length;
    const mov = MOVEMENTS[movIdx];
    const activeDims = [0,1,2,3,4].map(i => COMB[(dimBase+i) % COMB.length]);

    document.getElementById('movement').textContent = mov.name;
    document.getElementById('character').textContent = mov.character;
    document.getElementById('line').textContent = activeDims[0].line;
    document.getElementById('dims').innerHTML =
      activeDims.map(d => {
        const grp = GROUPS[d.g];
        const c = d.s==='fail' ? '#f44' : d.s==='warn' ? '#fa4' : `rgb(${grp.color.join(',')})`;
        return `<span style="color:${c}">${d.id} <small style="opacity:0.4">[${grp.label}]</small></span>`;
      }).join(' · ');

    const dur = scheduleMovement(step, t);
    t += dur - 3;
    step++;

    timer = setTimeout(advance, (dur - 3) * 1000);
  }

  advance();
  drawVis();
}

function halt() {
  playing = false;
  document.getElementById('btn-play').classList.remove('on');
  if (timer) clearTimeout(timer);
  if (tickInterval) clearInterval(tickInterval);
  if (animId) cancelAnimationFrame(animId);
  if (ctx) { ctx.close(); ctx = null; }
  document.getElementById('movement').textContent = '—';
  document.getElementById('character').textContent = '—';
  document.getElementById('line').textContent = '—';
  document.getElementById('dims').textContent = '';
  const c = document.getElementById('vis');
  c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

function toggleFault() {
  faultMode = !faultMode;
  document.getElementById('btn-fault').classList.toggle('on', faultMode);
  if (faultMode) {
    COMB.find(c => c.id==='kernel').s = 'fail';
    COMB.find(c => c.id==='anchor').s = 'fail';
    COMB.find(c => c.id==='ring').s = 'fail';
    COMB.find(c => c.id==='crown').s = 'warn';
  } else {
    COMB.forEach(c => { if (c.id !== 'ghost-typo') c.s = 'pass'; });
  }
}

const TAU = Math.PI * 2;
const TILT = 0.38;
const COS_T = Math.cos(TILT), SIN_T = Math.sin(TILT);

const BITMAP_ROWS = 9;
const textBitmaps = {};

function generateBitmap(text, copies) {
  const oc = document.createElement('canvas');
  const fontSize = BITMAP_ROWS;
  oc.height = BITMAP_ROWS + 2;
  const octx = oc.getContext('2d');
  octx.font = `bold ${fontSize}px monospace`;
  const singleW = Math.ceil(octx.measureText(text).width) + 4;
  const gap = Math.ceil(singleW * 0.3);
  const totalW = (singleW + gap) * copies;
  oc.width = totalW;

  octx.fillStyle = '#000';
  octx.fillRect(0, 0, totalW, oc.height);
  octx.fillStyle = '#fff';
  octx.font = `bold ${fontSize}px monospace`;
  octx.textBaseline = 'top';
  for (let c = 0; c < copies; c++) {
    octx.fillText(text, c * (singleW + gap) + 2, 1);
  }

  const imgData = octx.getImageData(0, 0, totalW, BITMAP_ROWS + 2);
  const d = imgData.data;
  const bitmap = [];
  for (let y = 0; y < BITMAP_ROWS; y++) {
    bitmap[y] = [];
    for (let x = 0; x < totalW; x++) {
      bitmap[y][x] = d[((y + 1) * totalW + x) * 4] / 255;
    }
  }
  return { bitmap, width: totalW, height: BITMAP_ROWS };
}

Object.keys(GROUPS).forEach(key => {
  textBitmaps[key] = generateBitmap(GROUPS[key].label, 3);
});

function sphProj(lat, theta, R, cx0, cy0) {
  const cL = Math.cos(lat), sL = Math.sin(lat);
  const x3 = R * cL * Math.cos(theta);
  const y3 = R * cL * Math.sin(theta);
  const z3 = R * sL;
  const yP = y3 * COS_T - z3 * SIN_T;
  const zP = y3 * SIN_T + z3 * COS_T;
  return { x: cx0 + x3, y: cy0 + yP, depth: (zP + R) / (2 * R) };
}

const bugs = {};
GROUP_SPHERE.forEach(gs => {
  bugs[gs.key] = {
    angle: Math.random() * TAU,
    wobPhase: Math.random() * 100,
    trail: [],
  };
});

const SCAN_DEPTH = 0.35;
const ARC_LEN = 25;

function drawVis() {
  if (!playing || !analyser) return;
  const c = document.getElementById('vis');
  const cx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = c.offsetWidth * dpr;
  c.height = c.offsetHeight * dpr;
  cx.scale(dpr, dpr);

  const w = c.offsetWidth, h = c.offsetHeight;
  const freqData = new Uint8Array(analyser.frequencyBinCount);
  let frameCount = 0;

  function frame() {
    if (!playing) return;
    animId = requestAnimationFrame(frame);
    analyser.getByteFrequencyData(freqData);
    frameCount++;

    cx.fillStyle = 'rgba(1, 1, 5, 0.010)';
    cx.fillRect(0, 0, w, h);

    const cx0 = w / 2, cy0 = h / 2;
    const R = Math.min(cx0, cy0) * 0.88;

    let totalEnergy = 0;
    for (let i = 0; i < 256; i++) totalEnergy += freqData[i];
    const energy = totalEnergy / 256 / 255;

    const activeCount = Math.min(7, Math.floor(frameCount / 240) + 1);

    cx.lineCap = 'round';
    cx.lineJoin = 'round';

    GROUP_SPHERE.forEach((gs, gi) => {
      if (gi >= activeCount) return;
      const birthFrame = gi * 240;
      const age = frameCount - birthFrame;
      const birthFade = Math.min(1, age / 90);

      const group = GROUPS[gs.key];
      const bm = textBitmaps[gs.key];
      const bug = bugs[gs.key];
      const color = group.color;

      const bandStart = Math.floor((gi / 7) * 200);
      let gE = 0;
      for (let b = 0; b < 28; b++) gE += freqData[bandStart + b];
      gE = gE / 28 / 255;

      const hasFault = COMB.some(d => d.g === gs.key && d.s === 'fail');
      const hasWarn = COMB.some(d => d.g === gs.key && d.s === 'warn');
      const dC = hasFault ? [255, 60, 40] :
                 hasWarn  ? [255, Math.round(color[1]*0.5+220*0.5), Math.round(color[2]*0.3)] :
                 color;

      bug.wobPhase += 0.011 + gE * 0.005;
      const speedWob = 1 + 0.2 * Math.sin(bug.wobPhase * 1.7 + gi * 2.3);
      bug.angle += gs.speed * (0.5 + gE * 2.5) * speedWob;

      const latWob = Math.sin(bug.wobPhase * 2.1 + gi) * 0.04
                   + Math.sin(bug.wobPhase * 5.3 + gi * 3) * 0.015
                   + Math.sin(bug.wobPhase * 0.7 + gi * 0.5) * 0.025;

      const pos = sphProj(gs.lat + latWob, bug.angle, R, cx0, cy0);
      const dep = 0.15 + 0.85 * pos.depth;

      const bugNorm = ((bug.angle % TAU) + TAU) % TAU;
      const bmCol = Math.floor((bugNorm / TAU) * bm.width) % bm.width;

      bug.trail.push({ x: pos.x, y: pos.y });
      if (bug.trail.length > ARC_LEN) bug.trail.shift();

      if (bug.trail.length > 2) {
        cx.beginPath();
        cx.moveTo(bug.trail[0].x, bug.trail[0].y);
        for (let i = 1; i < bug.trail.length; i++) cx.lineTo(bug.trail[i].x, bug.trail[i].y);
        cx.strokeStyle = `rgba(${dC[0]},${dC[1]},${dC[2]},${birthFade * dep * (0.03 + gE * 0.05)})`;
        cx.lineWidth = 3 + gE * 3;
        cx.stroke();

        cx.beginPath();
        cx.moveTo(bug.trail[0].x, bug.trail[0].y);
        for (let i = 1; i < bug.trail.length; i++) cx.lineTo(bug.trail[i].x, bug.trail[i].y);
        cx.strokeStyle = `rgba(${dC[0]},${dC[1]},${dC[2]},${birthFade * dep * (0.08 + gE * 0.12)})`;
        cx.lineWidth = 0.8 + gE * 0.5;
        cx.stroke();
      }

      for (let row = 0; row < bm.height; row++) {
        const intensity = bm.bitmap[row][bmCol];
        if (intensity < 0.06) continue;

        const t0 = (row / bm.height) * SCAN_DEPTH;
        const t1 = ((row + 1) / bm.height) * SCAN_DEPTH;

        const x0 = pos.x + (cx0 - pos.x) * t0;
        const y0 = pos.y + (cy0 - pos.y) * t0;
        const x1 = pos.x + (cx0 - pos.x) * t1;
        const y1 = pos.y + (cy0 - pos.y) * t1;

        const scanA = intensity * birthFade * dep * (0.06 + gE * 0.1);

        cx.beginPath();
        cx.moveTo(x0, y0);
        cx.lineTo(x1, y1);
        cx.strokeStyle = `rgba(${dC[0]},${dC[1]},${dC[2]},${scanA})`;
        cx.lineWidth = 0.8 + gE * 0.8 + intensity * 0.5;
        cx.stroke();
      }

      const beamA = birthFade * dep * (0.008 + gE * 0.015);
      if (beamA > 0.005) {
        const beamEnd = SCAN_DEPTH * 1.2; 
        cx.beginPath();
        cx.moveTo(pos.x, pos.y);
        cx.lineTo(pos.x + (cx0 - pos.x) * beamEnd, pos.y + (cy0 - pos.y) * beamEnd);
        cx.strokeStyle = `rgba(${dC[0]},${dC[1]},${dC[2]},${beamA})`;
        cx.lineWidth = 0.3;
        cx.stroke();
      }

      const headA = birthFade * dep * (0.12 + gE * 0.2);
      cx.beginPath();
      cx.arc(pos.x, pos.y, 1.5 + gE * 2, 0, TAU);
      cx.fillStyle = `rgba(255,255,255,${headA})`;
      cx.fill();
      
      cx.beginPath();
      cx.arc(pos.x, pos.y, 3 + gE * 3, 0, TAU);
      cx.fillStyle = `rgba(${dC[0]},${dC[1]},${dC[2]},${headA * 0.3})`;
      cx.fill();
    });

    const qR = R * 0.015 + energy * R * 0.01;
    const qG = cx.createRadialGradient(cx0, cy0, 0, cx0, cy0, qR * 2);
    qG.addColorStop(0, `rgba(255,255,255,${0.03 + energy * 0.08})`);
    qG.addColorStop(0.4, `rgba(200,190,170,${0.01 + energy * 0.03})`);
    qG.addColorStop(1, 'rgba(180,170,150,0)');
    cx.fillStyle = qG;
    cx.beginPath();
    cx.arc(cx0, cy0, qR * 2, 0, TAU);
    cx.fill();
  }

  frame();
}

// ── CLAUDE CODE MCP WEBSOCKET BRIDGE ──
const ws = new WebSocket('ws://localhost:5540');
ws.onopen = () => console.log('[KV Revolver] Connected to Claude Code Socket.');
ws.onmessage = (event) => {
  const data = JSON.parse(event.data);
  if (data.action === 'trigger_snap_lock') {
    console.log('[DRT] Received 27-Step Matrix:', data.payload);
    
    // Simulate solving visual lock:
    let stepCount = 0;
    const interval = setInterval(() => {
        if(stepCount >= 27) {
            clearInterval(interval);
            document.getElementById('movement').textContent = "SNAP LOCK";
            document.getElementById('movement').style.color = "#00ffaa";
            document.getElementById('character').textContent = "Eigenvector Matrix Stabilized";
            return;
        }
        
        let step = data.payload.ribosome_traversal[stepCount];
        document.getElementById('movement').textContent = `RIBOSOME ${step.step_id}`;
        document.getElementById('character').textContent = `${step.action} [${step.socratic_variable}]`;
        document.getElementById('line').textContent = data.payload.problem_summary;
        
        // Spin the bugs wildly mimicking structural adjustment
        Object.values(bugs).forEach(b => {
             b.angle += step.shift_value * 2.0;
        });

        stepCount++;
    }, 400); // Wait between steps to visualize
  }
};
