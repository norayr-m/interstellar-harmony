<script>
// ═══════════════════════════════════════════════
// ORBITAL TRANSFORMER
// Problem → Encode → Rank Processing → Decode → Solution
// With Interstellar-grade audio
// ═══════════════════════════════════════════════

const AC = window.AudioContext || window.webkitAudioContext;
let ctx, audioCtx, master, reverb, compressor, analyser;
let playing = false;
let dpr, W, H, CX, CY, R;

// ── RANK ARCHITECTURE ──
const RANKS = 7;
const RANK_COLORS = [
  [255, 220, 80],   // 0: crystallization — gold
  [255, 160, 50],   // 1: synthesis — amber
  [255, 90, 70],    // 2: compression — coral
  [220, 70, 190],   // 3: attention — magenta
  [110, 90, 230],   // 4: embedding — indigo
  [50, 170, 210],   // 5: tokenization — cyan
  [50, 210, 130],   // 6: input — emerald
];
const RANK_NAMES = [
  'crystallize', 'synthesize', 'compress',
  'attend', 'embed', 'tokenize', 'input'
];
const RANK_FUNCTIONS = [
  'solution → output tokens',
  'insights → solution structure',
  'key insights extracted',
  'cross-token attention',
  'words → semantic vectors',
  'raw text → word tokens',
  'problem text ingested'
];

// ── HARMONIC ARCHITECTURE — A minor, just intonation ──
const ROOT = 110; // A2
const SCALE = [1, 9/8, 6/5, 4/3, 3/2, 8/5, 9/5]; // A natural minor
const HARMONIC_RATIOS = [1, 2, 3/2, 4/3, 5/4, 5/3, 6/5];

// ── STATE ──
const TAU = Math.PI * 2;
let tokens = [];
let phase = 'idle'; // idle | encoding | processing | decoding | complete
let phaseTime = 0;
let currentRank = -1;
let corePulse = 0;
let tickInterval = null;
let time = 0;
let frameCount = 0;
let rankEnergy = new Array(RANKS).fill(0);
let solutionIssues = [];
let trailCanvas, trailCtx;

// ═══════════════════════════════════════════════
// TOKEN CLASS — a planet that moves through ranks
// ═══════════════════════════════════════════════
class Token {
  constructor(text, index, total) {
    this.text = text;
    this.index = index;
    this.rank = 6; // start at input rank
    this.targetRank = 6;
    this.angle = (index / total) * TAU + Math.random() * 0.3;
    this.angularSpeed = 0.3 + Math.random() * 0.2;
    this.orbitRadius = rankRadius(6);
    this.targetRadius = this.orbitRadius;
    this.size = 3 + Math.min(text.length, 8) * 0.4;
    this.brightness = 0;
    this.alpha = 0; // fade in
    this.trail = [];
    this.maxTrail = 40;
    this.processed = false;
    this.semantic = hashStr(text) % 7; // pseudo-semantic group
    this.energy = 0;
    // Audio
    this.osc = null;
    this.gain = null;
    this.freq = ROOT * HARMONIC_RATIOS[this.semantic] * (1 + (index % 3) * 0.5);
  }

  get x() { return CX + Math.cos(this.angle) * this.orbitRadius; }
  get y() { return CY + Math.sin(this.angle) * this.orbitRadius; }
  get color() { return RANK_COLORS[Math.round(this.rank)]; }

  update(dt) {
    // Smooth rank transition
    const rankDiff = this.targetRank - this.rank;
    if (Math.abs(rankDiff) > 0.01) {
      this.rank += rankDiff * dt * 1.5;
      this.targetRadius = rankRadius(this.rank);
    }
    // Smooth radius transition
    this.orbitRadius += (this.targetRadius - this.orbitRadius) * dt * 3;

    // Orbital motion — faster at inner ranks (Kepler)
    const keplerSpeed = 1 + (6 - this.rank) * 0.3;
    this.angle += this.angularSpeed * keplerSpeed * dt;

    // Fade in
    this.alpha = Math.min(1, this.alpha + dt * 2);

    // Energy decay
    this.energy *= 0.95;
    this.brightness *= 0.93;

    // Trail
    this.trail.push({ x: this.x, y: this.y, r: Math.round(this.rank) });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    // Audio modulation
    if (this.gain && audioCtx) {
      const posVol = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(this.angle - Math.PI/2));
      const phaseVol = phase === 'processing' ? 0.8 : 0.3;
      const vol = 0.04 * posVol * phaseVol * this.alpha / Math.max(1, tokens.length * 0.15);
      this.gain.gain.linearRampToValueAtTime(Math.min(vol, 0.08), audioCtx.currentTime + 0.05);
    }
  }

  draw() {
    if (this.alpha < 0.01) return;
    const [r, g, b] = this.color;
    const a = this.alpha;
    const br = this.brightness;

    // Trail on trail canvas
    for (let i = 1; i < this.trail.length; i++) {
      const t = this.trail[i];
      const tc = RANK_COLORS[t.r] || this.color;
      const ta = (i / this.trail.length) * 0.15 * a;
      trailCtx.strokeStyle = `rgba(${tc[0]},${tc[1]},${tc[2]},${ta})`;
      trailCtx.lineWidth = this.size * 0.3 * (i / this.trail.length);
      trailCtx.beginPath();
      trailCtx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
      trailCtx.lineTo(t.x, t.y);
      trailCtx.stroke();
    }

    // Glow
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 5);
    glow.addColorStop(0, `rgba(${r},${g},${b},${(0.2 + br * 0.3) * a})`);
    glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 5, 0, TAU);
    ctx.fill();

    // Body
    ctx.fillStyle = `rgba(${r},${g},${b},${(0.7 + br * 0.3) * a})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, TAU);
    ctx.fill();

    // Core
    ctx.fillStyle = `rgba(255,255,255,${(0.3 + br * 0.4) * a})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 0.3, 0, TAU);
    ctx.fill();

    // Label (only when processing this rank)
    if (phase === 'encoding' || (phase === 'processing' && Math.abs(this.rank - currentRank) < 0.5)) {
      ctx.font = '9px monospace';
      ctx.fillStyle = `rgba(${r},${g},${b},${0.4 * a})`;
      ctx.fillText(this.text, this.x + this.size + 4, this.y + 3);
    }
  }

  startAudio() {
    if (!audioCtx) return;
    this.osc = audioCtx.createOscillator();
    this.gain = audioCtx.createGain();
    const waves = ['sine', 'triangle', 'sine', 'triangle', 'sine', 'sine', 'triangle'];
    this.osc.type = waves[this.semantic];
    this.osc.frequency.value = this.freq;
    this.osc.detune.value = (Math.random() - 0.5) * 6;
    this.gain.gain.value = 0;
    this.osc.connect(this.gain);
    this.gain.connect(reverb);
    this.osc.start();
  }

  shiftToRank(r) {
    this.targetRank = r;
    this.energy = 1;
    this.brightness = 1;
    // Shift frequency as rank changes
    if (this.osc) {
      const newFreq = ROOT * SCALE[r % SCALE.length] * (1 + (this.index % 3) * 0.5);
      this.osc.frequency.linearRampToValueAtTime(newFreq, audioCtx.currentTime + 2);
    }
  }

  stopAudio() {
    if (this.gain && audioCtx) {
      this.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
      setTimeout(() => { try { this.osc.stop(); } catch(e) {} }, 600);
    }
    this.osc = null; this.gain = null;
  }
}

function rankRadius(r) {
  const minR = R * 0.12;
  const maxR = R * 0.85;
  return minR + (r / 6) * (maxR - minR);
}

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// ═══════════════════════════════════════════════
// INTERSTELLAR AUDIO ENGINE
// ═══════════════════════════════════════════════

function createCathedralReverb() {
  const len = audioCtx.sampleRate * 5;
  const buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      const t = i / len;
      let env;
      if (t < 0.015) env = 0.7;
      else if (t < 0.04) env = 1.6;
      else if (t < 0.08) env = 2.0;
      else if (t < 0.2) env = 1.2 * Math.pow(1 - (t-0.08)/0.12, 0.4);
      else env = 0.8 * Math.pow(1 - t, 2.5);
      d[i] = (Math.random() * 2 - 1) * env * (ch === 0 ? 1 : 0.93);
    }
  }
  const conv = audioCtx.createConvolver();
  conv.buffer = buf;
  return conv;
}

function warmChain(output) {
  const lo = audioCtx.createBiquadFilter();
  lo.type = 'lowshelf'; lo.frequency.value = 300; lo.gain.value = 6;
  const mid = audioCtx.createBiquadFilter();
  mid.type = 'peaking'; mid.frequency.value = 600; mid.Q.value = 0.7; mid.gain.value = 3;
  const hi = audioCtx.createBiquadFilter();
  hi.type = 'highshelf'; hi.frequency.value = 2500; hi.gain.value = -4;
  lo.connect(mid); mid.connect(hi); hi.connect(output);
  return lo;
}

function organ(freq, gain, t0, dur) {
  const warm = warmChain(reverb);
  const vg = audioCtx.createGain();
  vg.gain.setValueAtTime(0, t0);
  vg.gain.linearRampToValueAtTime(gain * 0.1, t0 + 1.2);
  vg.gain.linearRampToValueAtTime(gain * 0.5, t0 + 2.5);
  vg.gain.linearRampToValueAtTime(gain, t0 + dur * 0.5);
  vg.gain.setValueAtTime(gain, t0 + dur - 2);
  vg.gain.linearRampToValueAtTime(0, t0 + dur + 0.5);
  vg.connect(warm);

  const ranks = [
    { r:1, a:1.0, w:'triangle' },
    { r:2, a:0.5, w:'sine' },
    { r:3, a:0.25, w:'triangle' },
    { r:4, a:0.12, w:'sine' },
    { r:6, a:0.06, w:'sine' },
  ];
  ranks.forEach(rk => {
    for (let c = 0; c < 3; c++) {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = rk.w;
      o.frequency.value = freq * rk.r;
      o.detune.value = (c - 1) * 4 + (Math.random() - 0.5) * 3;
      g.gain.value = rk.a * (c === 1 ? 1 : 0.3);
      o.connect(g); g.connect(vg);
      o.start(t0); o.stop(t0 + dur + 1.5);
    }
  });
}

function stringPad(freq, gain, t0, dur) {
  const warm = warmChain(reverb);
  const vg = audioCtx.createGain();
  vg.gain.setValueAtTime(0, t0);
  vg.gain.linearRampToValueAtTime(gain * 0.3, t0 + 2.5);
  vg.gain.linearRampToValueAtTime(gain, t0 + dur * 0.6);
  vg.gain.setValueAtTime(gain, t0 + dur - 3);
  vg.gain.linearRampToValueAtTime(0, t0 + dur + 1);
  vg.connect(warm);

  for (let v = 0; v < 4; v++) {
    const o = audioCtx.createOscillator();
    const f = audioCtx.createBiquadFilter();
    const g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.value = freq;
    o.detune.value = (v - 1.5) * 7 + (Math.random() - 0.5) * 4;
    f.type = 'lowpass'; f.frequency.value = 450 + Math.random() * 150; f.Q.value = 0.5;
    g.gain.value = 0.22;
    o.connect(f); f.connect(g); g.connect(vg);
    o.start(t0); o.stop(t0 + dur + 2);
  }
}

function bassDrone(freq, gain, t0, dur) {
  [0.5, 0.25].forEach((mult, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = i === 0 ? 'triangle' : 'sine';
    o.frequency.value = freq * mult;
    const vol = gain * (i === 0 ? 0.7 : 0.4);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 2);
    g.gain.setValueAtTime(vol, t0 + dur - 2);
    g.gain.linearRampToValueAtTime(0, t0 + dur + 1);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + dur + 2);
  });
}

function startTick() {
  if (tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(() => {
    if (!audioCtx || !playing) return;
    const now = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const f = audioCtx.createBiquadFilter();
    o.type = 'square';
    o.frequency.value = 1200;
    f.type = 'bandpass'; f.frequency.value = 1000; f.Q.value = 5;
    g.gain.setValueAtTime(0.012, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
    o.connect(f); f.connect(g); g.connect(master);
    o.start(now); o.stop(now + 0.08);

    const el = document.getElementById('tick-vis');
    el.textContent = '·';
    el.style.opacity = '0.25';
    setTimeout(() => { el.style.opacity = '0.08'; }, 100);
  }, 1200);
}

function initAudio() {
  audioCtx = new AC();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.85;

  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -18;
  compressor.ratio.value = 3;
  compressor.attack.value = 0.3;
  compressor.release.value = 1.0;

  reverb = createCathedralReverb();
  master = audioCtx.createGain();
  master.gain.value = 0.65;

  const mw = audioCtx.createBiquadFilter();
  mw.type = 'lowshelf'; mw.frequency.value = 250; mw.gain.value = 4;
  const mp = audioCtx.createBiquadFilter();
  mp.type = 'peaking'; mp.frequency.value = 500; mp.Q.value = 0.5; mp.gain.value = 3;

  reverb.connect(compressor);
  compressor.connect(mw);
  mw.connect(mp);
  mp.connect(master);
  master.connect(analyser);
  analyser.connect(audioCtx.destination);
}

// ═══════════════════════════════════════════════
// REASONING ENGINE — Knowledge Graph + Pattern Solver
// Each rank actually transforms: tokenize → embed → attend → compress → synthesize → crystallize
// ═══════════════════════════════════════════════

// ── KNOWLEDGE GRAPH ──
const KG = {
  // Entities with properties and relations
  entities: {
    moon:    { type: 'celestial', dist_km: 384400, dist_label: '384,400 km', radius_km: 1737, mass_label: '7.3×10²² kg', orbits: 'earth', category: 'satellite', temp_c: '-173 to 127', age_by: 4.5 },
    sun:     { type: 'celestial', dist_km: 149600000, dist_label: '149.6 million km', radius_km: 696340, mass_label: '2.0×10³⁰ kg', orbits: null, category: 'star', temp_c: '5,500 surface', age_by: 4.6 },
    earth:   { type: 'celestial', dist_km: 0, dist_label: '0 (we are here)', radius_km: 6371, mass_label: '6.0×10²⁴ kg', orbits: 'sun', category: 'planet', temp_c: '-89 to 57', age_by: 4.5 },
    mars:    { type: 'celestial', dist_km: 225000000, dist_label: '225 million km', radius_km: 3390, mass_label: '6.4×10²³ kg', orbits: 'sun', category: 'planet', temp_c: '-153 to 20', age_by: 4.6 },
    jupiter: { type: 'celestial', dist_km: 778500000, dist_label: '778.5 million km', radius_km: 69911, mass_label: '1.9×10²⁷ kg', orbits: 'sun', category: 'planet', temp_c: '-145', age_by: 4.6 },
    venus:   { type: 'celestial', dist_km: 108200000, dist_label: '108.2 million km', radius_km: 6052, mass_label: '4.9×10²⁴ kg', orbits: 'sun', category: 'planet', temp_c: '462', age_by: 4.5 },
    mercury: { type: 'celestial', dist_km: 77300000, dist_label: '77.3 million km', radius_km: 2440, mass_label: '3.3×10²³ kg', orbits: 'sun', category: 'planet', temp_c: '-180 to 430', age_by: 4.5 },
    saturn:  { type: 'celestial', dist_km: 1434000000, dist_label: '1.4 billion km', radius_km: 58232, mass_label: '5.7×10²⁶ kg', orbits: 'sun', category: 'planet', temp_c: '-178', age_by: 4.5 },
    pluto:   { type: 'celestial', dist_km: 5906000000, dist_label: '5.9 billion km', radius_km: 1188, mass_label: '1.3×10²² kg', orbits: 'sun', category: 'dwarf planet', temp_c: '-230', age_by: 4.6 },
    water:   { type: 'substance', boils_c: 100, freezes_c: 0, formula: 'H₂O', state: 'liquid at room temp' },
    light:   { type: 'phenomenon', speed_ms: 299792458, speed_label: '299,792 km/s', medium: 'vacuum' },
    sound:   { type: 'phenomenon', speed_ms: 343, speed_label: '343 m/s', medium: 'air at 20°C' },
    gravity: { type: 'force', earth_ms2: 9.81, moon_ms2: 1.62, mars_ms2: 3.72, jupiter_ms2: 24.79 },
    pi:      { type: 'constant', value: 3.14159265358979, approx: '3.14159', nature: 'ratio of circumference to diameter' },
    e:       { type: 'constant', value: 2.71828182845904, approx: '2.71828', nature: 'base of natural logarithm' },
    c:       { type: 'constant', value: 299792458, unit: 'm/s', nature: 'speed of light in vacuum' },
    gold:    { type: 'element', symbol: 'Au', atomic: 79, melts_c: 1064, boils_c: 2856 },
    iron:    { type: 'element', symbol: 'Fe', atomic: 26, melts_c: 1538, boils_c: 2862 },
    diamond: { type: 'material', hardness: 10, composition: 'carbon', structure: 'cubic crystal' },
    python:  { type: 'language', paradigm: 'multi-paradigm', typing: 'dynamic', created: 1991 },
    rust:    { type: 'language', paradigm: 'multi-paradigm', typing: 'static', created: 2010 },
    javascript: { type: 'language', paradigm: 'multi-paradigm', typing: 'dynamic', created: 1995 },
  },

  // Relation patterns
  relations: {
    closer:   { prop: 'dist_km', compare: 'less', verb: 'closer to Earth' },
    farther:  { prop: 'dist_km', compare: 'greater', verb: 'farther from Earth' },
    further:  { prop: 'dist_km', compare: 'greater', verb: 'farther from Earth' },
    bigger:   { prop: 'radius_km', compare: 'greater', verb: 'bigger (by radius)' },
    larger:   { prop: 'radius_km', compare: 'greater', verb: 'bigger (by radius)' },
    smaller:  { prop: 'radius_km', compare: 'less', verb: 'smaller (by radius)' },
    heavier:  { prop: 'mass_label', compare: 'mass', verb: 'more massive' },
    hotter:   { prop: 'temp_c', compare: 'temp', verb: 'hotter' },
    older:    { prop: 'age_by', compare: 'greater', verb: 'older' },
    faster:   { prop: 'speed_ms', compare: 'greater', verb: 'faster' },
    harder:   { prop: 'hardness', compare: 'greater', verb: 'harder' },

// ── STOPWORDS ──
const STOPWORDS = new Set(['is','the','a','an','than','or','and','of','to','in','it','what','how','which','does','do','can','will','are','was','were','be','been','has','have','had','its','this','that','these','those','from','for','with','at','by','on','about','not','no','yes','very','more','most','much','many','some','any','each','every','all','both','few','so','too','also','just','only','then','now','here','there','where','when','why','who','whom','whose','if','but','yet','nor','either','neither','whether','because','since','while','until','after','before','during','between','through','into','out','up','down','over','under','again','once','other','another','own','same','such','like','as']);

// ── RANK PROCESSORS ──
// Each returns a transformation object showing what happened

function rankProcess(input, rankIdx) {
  switch(rankIdx) {
    case 6: return processInput(input);
    case 5: return processTokenize(input);
    case 4: return processEmbed(input);
    case 3: return processAttend(input);
    case 2: return processCompress(input);
    case 1: return processSynthesize(input);
    case 0: return processCrystallize(input);
    default: return input;
  }
}

function processInput(state) {
  // Rank 6: raw text → normalized words
  const rawText = (typeof state === 'string' ? state : state.raw) || '';
  const normalized = rawText.toLowerCase().replace(/[^\w\s']/g, ' ').trim();
  const words = normalized.split(/\s+/).filter(w => w.length > 0);
  return { words, raw: rawText, type: 'input' };
}

function processTokenize(state) {
  // Rank 5: separate content words from stopwords, detect question type
  const content = state.words.filter(w => !STOPWORDS.has(w));
  const stopped = state.words.filter(w => STOPWORDS.has(w));
  let qtype = 'statement';
  const raw = state.raw.toLowerCase();
  if (raw.includes('?') || raw.startsWith('is ') || raw.startsWith('what ') || raw.startsWith('how ') ||
      raw.startsWith('which ') || raw.startsWith('why ') || raw.startsWith('who ') || raw.startsWith('where ') ||
      raw.startsWith('when ') || raw.startsWith('does ') || raw.startsWith('do ') || raw.startsWith('can ')) {
    if (raw.startsWith('what') || raw.startsWith('how much') || raw.startsWith('how far') || raw.startsWith('how big')) qtype = 'factual';
    else if (content.some(w => KG.relations[w])) qtype = 'comparison';
    else if (raw.startsWith('why')) qtype = 'causal';
    else if (raw.startsWith('how')) qtype = 'procedural';
    else qtype = 'yes-no';
  }
  return { ...state, content, stopped, qtype, type: 'tokenized' };
}

function processEmbed(state) {
  // Rank 4: map content words to knowledge graph entities
  const entities = [];
  const relations = [];
  const unmapped = [];

  state.content.forEach(w => {
    // Check relations FIRST (prevents "closer" matching entity "c")
    const rel = Object.keys(KG.relations).find(r => w === r || w.startsWith(r));
    if (rel) { relations.push({ word: w, key: rel, data: KG.relations[rel] }); return; }
    // Check entities — exact match, plural, or prefix (but key must be >= 3 chars for prefix)
    const key = Object.keys(KG.entities).find(k => w === k || w === k + 's' || (k.length >= 3 && w.startsWith(k)));
    if (key) { entities.push({ word: w, key, data: KG.entities[key] }); return; }
    unmapped.push(w);
  });

  return { ...state, entities, relations, unmapped, type: 'embedded' };
}

function processAttend(state) {
  // Rank 3: cross-attention — find which entities relate to which via relations
  const connections = [];

  if (state.entities.length >= 2 && state.relations.length >= 1) {
    // Comparison: entity A [relation] entity B
    const rel = state.relations[0];
    for (let i = 0; i < state.entities.length; i++) {
      for (let j = i + 1; j < state.entities.length; j++) {
        const a = state.entities[i];
        const b = state.entities[j];
        const prop = rel.data.prop;
        if (a.data[prop] !== undefined && b.data[prop] !== undefined) {
          connections.push({ a, b, relation: rel, prop });
        }
      }
    }
  } else if (state.entities.length === 1) {
    // Single entity query — attend to properties
    const ent = state.entities[0];
    connections.push({ a: ent, b: null, relation: null, prop: 'describe' });
  }

  return { ...state, connections, type: 'attended' };
}

function processCompress(state) {
  // Rank 2: extract key insights from connections
  const insights = [];

  state.connections.forEach(conn => {
    if (conn.prop === 'describe') {
      // Describe entity
      const d = conn.a.data;
      const props = Object.entries(d)
        .filter(([k,v]) => k !== 'type' && v !== null && v !== undefined)
        .map(([k,v]) => `${k.replace(/_/g,' ')}: ${v}`);
      insights.push({
        severity: 'info',
        rank: 2,
        text: `${conn.a.key.toUpperCase()} (${d.type}) — ${props.join(' · ')}`
      });
    } else if (conn.relation) {
      // Comparison
      const rel = conn.relation;
      const prop = rel.data.prop;
      const va = conn.a.data[prop];
      const vb = conn.b.data[prop];

      if (typeof va === 'number' && typeof vb === 'number') {
        const aWins = rel.data.compare === 'less' ? va < vb : va > vb;
        const winner = aWins ? conn.a : conn.b;
        const loser = aWins ? conn.b : conn.a;
        const ratio = Math.max(va, vb) / Math.max(1, Math.min(va, vb));

        insights.push({
          severity: 'critical',
          rank: 2,
          text: `YES — ${winner.key} is ${rel.data.verb} than ${loser.key}`
        });
        insights.push({
          severity: 'warn',
          rank: 3,
          text: `${conn.a.key}: ${prop.replace(/_/g,' ')} = ${va.toLocaleString()} · ${conn.b.key}: ${prop.replace(/_/g,' ')} = ${vb.toLocaleString()}`
        });
        insights.push({
          severity: 'info',
          rank: 4,
          text: `Ratio: ${ratio.toFixed(1)}x — ${winner.key} ${rel.data.compare === 'less' ? 'is' : 'is'} ${ratio.toFixed(0)}x ${rel.data.verb}`
        });
      }
    }
  });

  // If no insights were generated, try general knowledge
  if (insights.length === 0 && state.entities.length > 0) {
    state.entities.forEach(ent => {
      const d = ent.data;
      insights.push({
        severity: 'info',
        rank: 1,
        text: `${ent.key}: ${JSON.stringify(d, null, 0).replace(/[{}"]/g, '').replace(/,/g, ' · ')}`
      });
    });
  }

  if (insights.length === 0) {
    // Truly unknown — acknowledge gracefully
    insights.push({
      severity: 'warn',
      rank: 0,
      text: `No entities matched in knowledge graph. Tokens: [${state.content.join(', ')}]`
    });
    insights.push({
      severity: 'info',
      rank: 1,
      text: `Question type detected: ${state.qtype}. Need wider knowledge base or API connection for this query.`
    });
  }

  return { ...state, insights, type: 'compressed' };
}

function processSynthesize(state) {
  // Rank 1: structure the answer
  const answer = {
    summary: '',
    details: state.insights,
    confidence: state.connections.length > 0 ? 'high' : state.entities.length > 0 ? 'medium' : 'low'
  };

  // Build summary from insights
  const critical = state.insights.filter(i => i.severity === 'critical');
  if (critical.length > 0) {
    answer.summary = critical.map(i => i.text).join('. ');
  } else {
    answer.summary = state.insights.map(i => i.text).join('. ');
  }

  return { ...state, answer, type: 'synthesized' };
}

function processCrystallize(state) {
  // Rank 0: final output format
  const issues = [];

  // Add processing trace
  issues.push({
    severity: 'info', rank: 6,
    text: `Input: "${state.raw}" → ${state.words.length} words`
  });
  issues.push({
    severity: 'info', rank: 5,
    text: `Question type: ${state.qtype} · Content words: [${state.content.join(', ')}] · Stopped: ${state.stopped.length} words`
  });
  if (state.entities.length > 0) {
    issues.push({
      severity: 'info', rank: 4,
      text: `Entities: ${state.entities.map(e => e.key + ' (' + e.data.type + ')').join(', ')}${state.relations.length > 0 ? ' · Relations: ' + state.relations.map(r => r.key).join(', ') : ''}`
    });
  }
  if (state.connections.length > 0) {
    issues.push({
      severity: 'info', rank: 3,
      text: `Attention: ${state.connections.length} connection(s) found between entities`
    });
  }

  // Add answer insights
  state.insights.forEach(i => issues.push(i));

  // Add confidence
  issues.push({
    severity: state.answer.confidence === 'high' ? 'critical' : state.answer.confidence === 'medium' ? 'warn' : 'info',
    rank: 0,
    text: `Confidence: ${state.answer.confidence} · Summary: ${state.answer.summary}`
  });

  return { issues, tokens: state.content.length > 0 ? state.content : state.words.slice(0, 16) };
}

function findProblem(input) {
  // Check for the hardcoded orbital-dynamics audit
  if (input.toLowerCase().includes('check orbital-dynamics')) {
    return {
      tokens: ['canvas', 'sizing', 'audio', 'reverb', 'warmth', 'compressor',
               'trails', 'stars', 'remove', 'bug', 'resonance', 'kepler',
               'labels', 'analyser', 'reactive', 'performance'],
      issues: [
        { severity: 'critical', rank: 6, text: 'Canvas never sized to viewport — no width/height CSS on <canvas>, only on container.' },
        { severity: 'critical', rank: 5, text: 'Audio has no compressor — 28 oscillators sum can clip. Need DynamicsCompressor.' },
        { severity: 'critical', rank: 4, text: 'Reverb is two delay taps, not convolution — sounds thin. Need createConvolver() with impulse response.' },
        { severity: 'warn', rank: 3, text: 'No warmth chain — laptop speakers lose low end. Need lowshelf boost + highshelf cut.' },
        { severity: 'warn', rank: 3, text: 'btnRemove can delete the only planet at a rank — random splice breaks guarantee.' },
        { severity: 'warn', rank: 2, text: 'countAtRank() called per planet per frame — O(n²). Cache rank counts per frame.' },
        { severity: 'info', rank: 2, text: 'No analyser node — visuals don\'t respond to actual audio output.' },
        { severity: 'info', rank: 1, text: 'Stars flash once (main canvas cleared each frame) — should use trail canvas.' },
        { severity: 'info', rank: 1, text: 'Mode button has no .active class — no visual feedback for current mode.' },
        { severity: 'info', rank: 0, text: 'mouseX/mouseY tracked but never used — dead code.' },
      ]
    };
  }

  // Run through the reasoning pipeline
  let state = { raw: input };
  for (let r = 6; r >= 0; r--) {
    try {
      console.log(`Rank ${r} input:`, JSON.stringify(state).substring(0, 200));
      state = rankProcess(state, r);
      console.log(`Rank ${r} output:`, JSON.stringify(state).substring(0, 200));
    } catch(err) {
      console.error(`Rank ${r} error:`, err);
      return {
        tokens: input.split(/\s+/).slice(0, 16),
        issues: [{ severity: 'critical', rank: r, text: `Pipeline error at rank ${r} (${RANK_NAMES[r]}): ${err.message}` }]
      };
    }
  }
  return state; // { issues, tokens }
}

// ═══════════════════════════════════════════════
// SOLVE PIPELINE
// ═══════════════════════════════════════════════

let solveTimer = null;

function resetState() {
  tokens.forEach(t => { try { t.stopAudio(); } catch(e) {} });
  tokens = [];
  phase = 'idle';
  currentRank = -1;
  playing = false;
  if (tickInterval) clearInterval(tickInterval);
  document.getElementById('btn-solve').classList.remove('active');
}

function solve() {
  const input = document.getElementById('problem-input').value.trim();
  if (!input) return;

  // Force reset if stuck
  if (phase !== 'idle') {
    resetState();
    // Small delay then re-trigger
    setTimeout(() => solve(), 100);
    return;
  }

  let problem;
  try {
    problem = findProblem(input);
    console.log('findProblem result:', problem);
  } catch(err) {
    console.error('findProblem error:', err);
    // Fallback: generic tokenization
    const words = input.split(/\s+/).filter(w => w.length > 0);
    problem = {
      tokens: words.slice(0, 16),
      issues: [{ severity: 'warn', rank: 0, text: 'Reasoning engine error: ' + err.message }]
    };
  }

  solutionIssues = problem.issues || [];
  const problemTokens = problem.tokens || input.split(/\s+/).slice(0, 16);

  // Init audio
  try {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(err) {
    console.error('Audio init error:', err);
  }
  playing = true;
  startTick();

  document.getElementById('btn-solve').classList.add('active');
  document.getElementById('solution-panel').classList.remove('visible');
  document.getElementById('solution-text').innerHTML = '';

  // Phase 1: ENCODE — tokens appear on rank 6
  phase = 'encoding';
  phaseTime = 0;

  // Bass drone for the whole solve
  try {
    const t0 = audioCtx.currentTime + 0.3;
    bassDrone(ROOT, 0.04, t0, 45);
  } catch(err) { console.error('Bass drone error:', err); }

  // Create tokens with staggered entry
  tokens = [];
  problemTokens.forEach((word, i) => {
    setTimeout(() => {
      try {
        const tok = new Token(word, i, problemTokens.length);
        tokens.push(tok);
        tok.startAudio();
        const freq = ROOT * SCALE[i % SCALE.length] * 2;
        organ(freq, 0.015, audioCtx.currentTime, 4);
      } catch(err) { console.error('Token create error:', err); }
    }, i * 300);
  });

  // Phase 2: PROCESSING — tokens spiral inward rank by rank
  const encodeTime = problemTokens.length * 300 + 1500;
  setTimeout(() => {
    phase = 'processing';
    processRanks(5);
  }, encodeTime);
}

function processRanks(rank) {
  if (rank < 0) {
    // Phase 3: DECODE — tokens spiral back out
    phase = 'decoding';
    currentRank = -1;
    decodeSequence(0);
    return;
  }

  currentRank = rank;
  phaseTime = 0;

  // Move all tokens to this rank
  tokens.forEach((tok, i) => {
    setTimeout(() => {
      tok.shiftToRank(rank);
      rankEnergy[rank] = 1;
    }, i * 100);
  });

  // String pad for this rank's harmonic
  const freq = ROOT * SCALE[rank % SCALE.length];
  stringPad(freq, 0.02, audioCtx.currentTime, 5);

  // Organ chord — the rank processing
  const chordDegs = [rank % 7, (rank + 2) % 7, (rank + 4) % 7];
  chordDegs.forEach((deg, i) => {
    const f = ROOT * SCALE[deg] * (i === 0 ? 1 : 2);
    organ(f, 0.012, audioCtx.currentTime + i * 0.3, 4);
  });

  // Next rank after processing time
  setTimeout(() => processRanks(rank - 1), 3000);
}

function decodeSequence(issueIdx) {
  if (issueIdx >= solutionIssues.length) {
    // Complete
    phase = 'complete';
    currentRank = -1;

    // Resolution chord — A major (picardy third)
    const t0 = audioCtx.currentTime;
    organ(ROOT, 0.025, t0, 8);
    organ(ROOT * 5/4, 0.02, t0 + 0.2, 7); // major third
    organ(ROOT * 3/2, 0.02, t0 + 0.4, 7); // fifth
    stringPad(ROOT * 2, 0.015, t0, 8);

    // Tokens spiral back to rank 6
    tokens.forEach((tok, i) => {
      setTimeout(() => tok.shiftToRank(6), i * 150);
    });

    setTimeout(() => {
      playing = false;
      if (tickInterval) clearInterval(tickInterval);
      document.getElementById('btn-solve').classList.remove('active');
      // Show full solution
      document.getElementById('solution-panel').classList.add('visible');
      renderFullSolution();
      // Reset for next solve
      setTimeout(() => {
        tokens.forEach(t => t.stopAudio());
        tokens = [];
        phase = 'idle';
      }, 2000);
    }, 3000);
    return;
  }

  const issue = solutionIssues[issueIdx];
  currentRank = issue.rank;

  // Move some tokens to this issue's rank
  const affected = tokens.filter((_, i) => i % solutionIssues.length === issueIdx || i % 3 === issue.rank % 3);
  affected.forEach((tok, i) => {
    setTimeout(() => {
      tok.shiftToRank(issue.rank);
      tok.brightness = 1;
    }, i * 80);
  });

  // Severity-based audio
  const freq = ROOT * SCALE[issue.rank % SCALE.length];
  if (issue.severity === 'critical') {
    // Dissonant — tritone
    organ(freq, 0.018, audioCtx.currentTime, 3);
    organ(freq * Math.sqrt(2), 0.012, audioCtx.currentTime + 0.1, 2.5);
  } else if (issue.severity === 'warn') {
    // Minor second tension
    organ(freq, 0.015, audioCtx.currentTime, 3);
    organ(freq * 16/15, 0.008, audioCtx.currentTime + 0.2, 2);
  } else {
    // Clean
    organ(freq, 0.012, audioCtx.currentTime, 3);
  }

  // Append to solution panel
  appendIssue(issue, issueIdx);

  // Core pulse on critical
  if (issue.severity === 'critical') corePulse = 1;

  setTimeout(() => decodeSequence(issueIdx + 1), 2200);
}

function appendIssue(issue, idx) {
  document.getElementById('solution-panel').classList.add('visible');
  const div = document.createElement('div');
  div.className = `issue ${issue.severity}`;
  const tag = `<span class="rank-tag">rank ${issue.rank} · ${RANK_NAMES[issue.rank]}</span>`;
  div.innerHTML = `[${issue.severity.toUpperCase()}] ${issue.text}${tag}`;
  div.style.opacity = '0';
  div.style.transform = 'translateX(-10px)';
  document.getElementById('solution-text').appendChild(div);
  requestAnimationFrame(() => {
    div.style.transition = 'all 0.5s ease';
    div.style.opacity = '1';
    div.style.transform = 'translateX(0)';
  });
}

function renderFullSolution() {
  // Already rendered incrementally, just ensure panel is visible
  document.getElementById('solution-panel').classList.add('visible');
}

// RENDERING
// ═══════════════════════════════════════════════

const canvas = document.getElementById('vis');
ctx = canvas.getContext('2d');

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  CX = W / 2;
  CY = H / 2;
  R = Math.min(CX, CY) * 0.9;

  if (!trailCanvas) {
    trailCanvas = document.createElement('canvas');
    trailCtx = trailCanvas.getContext('2d');
  }
  trailCanvas.width = W * dpr;
  trailCanvas.height = H * dpr;
  trailCtx.scale(dpr, dpr);
}
window.addEventListener('resize', resize);
resize();

function drawOrbits() {
  for (let r = 0; r < RANKS; r++) {
    const radius = rankRadius(r);
    const [cr, cg, cb] = RANK_COLORS[r];
    const active = r === currentRank;
    const energy = rankEnergy[r];
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${active ? 0.25 + energy * 0.2 : 0.04 + energy * 0.08})`;
    ctx.lineWidth = active ? 1.5 : 0.5;
    ctx.setLineDash(r === 0 ? [] : [3, 6 + r * 2]);
    ctx.beginPath();
    ctx.arc(CX, CY, radius, 0, TAU);
    ctx.stroke();
    ctx.setLineDash([]);

    // Rank label
    if (active || energy > 0.3) {
      ctx.font = '9px monospace';
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${0.2 + energy * 0.3})`;
      ctx.fillText(RANK_NAMES[r], CX + radius + 8, CY - 4);
    }
  }
}

function drawCore() {
  const pulse = 0.5 + 0.5 * Math.sin(time * 1.2) * (0.4 + corePulse * 0.6);

  // Outer glow
  const glow = ctx.createRadialGradient(CX, CY, 0, CX, CY, R * 0.15);
  glow.addColorStop(0, `rgba(255,220,80,${0.3 * pulse})`);
  glow.addColorStop(0.5, `rgba(255,180,40,${0.08 * pulse})`);
  glow.addColorStop(1, 'rgba(255,150,30,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(CX, CY, R * 0.15, 0, TAU);
  ctx.fill();

  // Hexagonal body
  const qr = 10 + corePulse * 4;
  ctx.fillStyle = `rgba(255,210,60,${0.7 + 0.3 * pulse})`;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 6 + time * 0.08;
    const x = CX + Math.cos(a) * qr;
    const y = CY + Math.sin(a) * qr;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();

  // Inner light
  ctx.fillStyle = `rgba(255,255,220,${0.4 + 0.3 * pulse})`;
  ctx.beginPath();
  ctx.arc(CX, CY, qr * 0.3, 0, TAU);
  ctx.fill();
}

function drawGravityLines() {
  for (let r = 0; r < RANKS; r++) {
    const radius = rankRadius(r);
    const [cr, cg, cb] = RANK_COLORS[r];
    const energy = rankEnergy[r];
    if (energy < 0.05) continue;
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i + time * 0.015 * (r + 1);
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${0.02 + energy * 0.06})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.lineTo(CX + Math.cos(a) * radius, CY + Math.sin(a) * radius);
      ctx.stroke();
    }
  }
}

function updateRankSidebar() {
  let html = '';
  for (let r = RANKS - 1; r >= 0; r--) {
    const [cr, cg, cb] = RANK_COLORS[r];
    const active = r === currentRank;
    const energy = rankEnergy[r];
    const barW = Math.round(energy * 60);
    html += `<div class="rank-row ${active ? 'active' : ''}" style="color:rgba(${cr},${cg},${cb},${active ? 0.9 : 0.3 + energy * 0.4})">`;
    html += `${r} ${RANK_NAMES[r]}`;
    html += `<span class="bar" style="width:${barW}px;background:rgba(${cr},${cg},${cb},${0.4 + energy * 0.4})"></span>`;
    html += `</div>`;
  }
  document.getElementById('rank-sidebar').innerHTML = html;
}

function updatePhaseDisplay() {
  const el = document.getElementById('phase-display');
  if (phase === 'idle') { el.textContent = ''; return; }
  const phaseLabel = {
    encoding: 'ENCODING — tokens entering rank 6',
    processing: `PROCESSING — rank ${currentRank} · ${RANK_NAMES[currentRank] || ''}`,
    decoding: 'DECODING — solution emerging',
    complete: 'COMPLETE'
  };
  el.textContent = phaseLabel[phase] || '';
}

// ── MAIN LOOP ──
let lastTime = performance.now();
const freqData = new Uint8Array(1024);

function animate(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  time += dt;
  phaseTime += dt;
  frameCount++;

  // Audio energy
  let audioEnergy = 0;
  if (analyser && playing) {
    analyser.getByteFrequencyData(freqData);
    for (let i = 0; i < 256; i++) audioEnergy += freqData[i];
    audioEnergy = audioEnergy / 256 / 255;
  }

  // Decay rank energy
  rankEnergy = rankEnergy.map(e => e * 0.97);
  corePulse *= 0.98;

  // Trail fade
  trailCtx.save();
  trailCtx.setTransform(1,0,0,1,0,0);
  trailCtx.fillStyle = 'rgba(2,2,4,0.015)';
  trailCtx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);
  trailCtx.restore();

  // Clear main
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();

  // Draw trail
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.drawImage(trailCanvas, 0, 0);
  ctx.restore();

  drawGravityLines();
  drawOrbits();
  tokens.forEach(t => t.update(dt));
  tokens.forEach(t => t.draw());
  drawCore();

  if (frameCount % 20 === 0) {
    updateRankSidebar();
    updatePhaseDisplay();
  }

  requestAnimationFrame(animate);
}

// Key shortcut — Enter to solve
document.getElementById('problem-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') solve();
});

requestAnimationFrame(animate);
</script>
